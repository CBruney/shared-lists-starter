<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Shared Lists Offline</title>
    <style>
      :root {
        color: #1f2937;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f6f8fb;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #fff;
        border: 1px solid #d9e2ef;
        border-radius: 12px;
        max-width: 420px;
        padding: 24px;
      }

      h1 {
        color: #111827;
        font-size: 24px;
        line-height: 1.1;
        margin: 0 0 10px;
      }

      p {
        color: #667085;
        font-size: 16px;
        line-height: 1.45;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main aria-label="Offline">
      <h1>Shared Lists</h1>
      <p>Reconnect to load your lists.</p>
    </main>
  </body>
</html>
