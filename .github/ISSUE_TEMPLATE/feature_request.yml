name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App UI
        - API
        - Auth
        - D1 schema
        - OpenAI Sites deploy
        - Cloudflare deploy
        - Docs
        - Other
