name: Help question
description: Ask for setup or usage help
title: "[Question]: "
labels: ["question"]
body:
  - type: dropdown
    id: hosting
    attributes:
      label: Hosting lane
      options:
        - Local dev
        - OpenAI Sites
        - Cloudflare Workers + D1 + Access
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to do. Remove secrets, private emails, private URLs, and database IDs.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Include commands or docs you followed, with secrets removed.
