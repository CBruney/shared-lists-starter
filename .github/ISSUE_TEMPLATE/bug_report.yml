name: Bug report
description: Report something broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: hosting
    attributes:
      label: Hosting lane
      options:
        - Local dev
        - OpenAI Sites
        - Cloudflare Workers + D1 + Access
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Remove secrets, private emails, private URLs, and database IDs.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Remove secrets first.
